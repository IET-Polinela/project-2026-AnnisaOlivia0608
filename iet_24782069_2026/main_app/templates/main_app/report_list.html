{% extends 'base.html' %}
{% block content %}

<h2 class="mb-3">Daftar Laporan</h2>

<a href="{% url 'add_report' %}" class="btn btn-success mb-3">
    + Tambah Laporan
</a>

<table class="table table-striped table-bordered">
    <thead class="table-dark">
        <tr>
            <th>Judul</th>
            <th>Lokasi</th>
            <th>Status</th>
            <th>Aksi</th>
        </tr>
    </thead>
    <tbody>
        {% for report in reports %}
        <tr>
            <td>{{ report.title }}</td>
            <td>{{ report.location }}</td>
            <td>{{ report.status }}</td>
            <td>
                <!-- EDIT -->
                <a href="{% url 'update_report' report.pk %}" class="btn btn-warning btn-sm">
                    Edit
                </a>

                <!-- DELETE -->
                <a href="{% url 'delete_report' report.pk %}" class="btn btn-danger btn-sm">
                    Hapus
                </a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4" class="text-center">
                Belum ada laporan 😢
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
