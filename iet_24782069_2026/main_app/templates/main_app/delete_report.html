{% extends 'base.html' %}
{% block content %}

<h2>Konfirmasi Hapus</h2>

<p>Apakah kamu yakin ingin menghapus:</p>
<p><b>{{ report.title }}</b></p>

<form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">
        Ya, Hapus
    </button>
</form>

<a href="{% url 'report_list' %}" class="btn btn-secondary mt-2">
    Batal
</a>

{% endblock %}
